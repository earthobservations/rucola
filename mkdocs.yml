site_name: rucola
site_description: Climate station data homogenization implementing the González-Rouco et al. (2001) six-step SNHT procedure
site_url: https://earthobservations.github.io/rucola/
repo_url: https://github.com/earthobservations/rucola
repo_name: earthobservations/rucola

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            docstring_style: numpy
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting Started: guide/quickstart.md
  - Algorithm: guide/algorithm.md
  - Normalization: guide/normalization.md
  - API Reference:
      - Rucola: api/rucola.md
      - Homogeneity Tests: api/tests.md
      - Results: api/results.md
      - Configuration: api/normalization.md
      - Preprocessing: api/preprocessing.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
