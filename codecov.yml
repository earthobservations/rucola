codecov:
  require_ci_to_pass: true

coverage:
  precision: 1
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        target: auto
        threshold: 5%

  ignore:
    - "tests/**"
    - "docs/**"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true

flags:
  unit:
    paths:
      - src/
    carryforward: true
  integration:
    paths:
      - src/
    carryforward: true
