name: Coverage

on:
  push:
    branches: [ main ]
  pull_request: ~

  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  OS: "ubuntu-latest"
  PYTHON: "3.14"

permissions: {}

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'

  coverage:
    needs: filter
    if: needs.filter.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: codecov
    permissions:
      contents: read
    steps:
      - name: Acquire sources
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON }}

      - name: Install project
        run: uv sync --group test --extra duckdb

      - name: Run unit tests with coverage
        run: uv run poe coverage-unit

      - name: Upload unit coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-unit.xml
          env_vars: OS,PYTHON
          flags: unit
          fail_ci_if_error: false

      - name: Upload unit test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-unit.xml
          flags: unit
          report_type: test_results

      - name: Run integration tests with coverage
        run: uv run poe coverage-integration

      - name: Upload integration coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-integration.xml
          env_vars: OS,PYTHON
          flags: integration
          fail_ci_if_error: false

      - name: Upload integration test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-integration.xml
          flags: integration
          report_type: test_results
