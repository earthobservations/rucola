name: Typecheck

on:
  push:
    branches: [ main ]
  pull_request: ~

  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  PYTHON: "3.14"

permissions: {}

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'

  typecheck:
    needs: filter
    if: needs.filter.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Acquire sources
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON }}

      - name: Install project
        run: uv sync --group test --group notebooks --extra duckdb

      - name: Run type checks
        run: uv run poe type
