name: Feature request
description: Propose a new feature or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What limitation or use case is driving this request?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like rucola to do differently or additionally?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about, if any.

  - type: textarea
    id: references
    attributes:
      label: References
      description: Papers, datasets, or prior art relevant to this request (e.g. a specific variant of SNHT or a new correction scheme).
